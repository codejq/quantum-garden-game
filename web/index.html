<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Garden</title>
<link rel="stylesheet" href="assets/fonts/baloo-bhaijaan-2.css">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="game"></div>

<div id="hud">
  <div class="hud-top">
    <div class="chip">⭐ <span class="n" id="uiScore">0</span></div>
    <div class="chip">🌳 <span class="n" id="uiTrees">0</span></div>
    <div class="chip">🗑️ <span class="n" id="uiTrash">0</span></div>
    <div class="chip">🎯 <span id="uiLevelLabel">Level</span> <span class="n" id="uiLevel">1</span></div>
    <div id="meterWrap">
      <div class="lbl"><span id="cleanlinessLabel">Garden cleanliness</span><span id="meterPct">0%</span></div>
      <div id="meterBar"><div id="meterFill"></div></div>
    </div>
  </div>
  <div id="missionCard"></div>
  <div id="notes"></div>
  <div id="prompt">🌱 Press to plant a tree!</div>
  <button id="viewBtn" aria-label="Toggle camera view">View</button>
  <button id="resetViewBtn" aria-label="Reset camera view">Reset</button>
  <button id="pauseBtn" aria-label="Pause game">Pause</button>
  <button id="exitBtn" aria-label="Exit game">Exit</button>
</div>

<div id="joy"><div id="joyKnob"></div></div>
<button id="actBtn" aria-label="Plant tree">🌱</button>
<button id="sndBtn" aria-label="Toggle sound">🔊</button>

<div class="overlay" id="startOverlay">
  <div class="card">
    <h1 id="gameTitle">Clean Garden</h1>
    <div class="tag" id="tagline">A 3D adventure to save the garden! 🌍</div>
    <label class="langPick" for="languageSelect"><span id="languageLabel">Language</span>
      <select id="languageSelect" aria-label="Language">
        <option value="en" selected>English</option>
        <option value="ar">العربية</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
      </select>
    </label>
    <div class="howto" id="howto"></div>
    <button class="bigbtn" id="startBtn" aria-label="Start adventure">🚀 Start Adventure</button>
    <div id="keysHint"></div>
  </div>
</div>

<div class="overlay" id="lvlOverlay">
  <div class="card">
    <h1 id="lvlTitle">🎉 Level complete!</h1>
    <div class="quote" id="lvlQuote"></div>
    <div class="stats">
      <div class="stat">⭐<div class="b" id="stScore">0</div></div>
      <div class="stat">🌳<div class="b" id="stTrees">0</div></div>
      <div class="stat">🗑️<div class="b" id="stTrash">0</div></div>
      <div class="stat"><span id="stTimeLabel">Time</span><div class="b" id="stTime">0:00.0</div></div>
      <div class="stat"><span id="stBestLabel">Best</span><div class="b" id="stBest">--</div></div>
    </div>
    <button class="bigbtn" id="nextBtn" aria-label="Next level">Next Level</button>
  </div>
</div>

<div class="overlay" id="pauseOverlay">
  <div class="card">
    <h1 id="pauseTitle">Paused</h1>
    <div class="pauseActions">
      <button class="bigbtn" id="resumeBtn" aria-label="Resume game">Resume</button>
      <button class="bigbtn altbtn" id="retryBtn" aria-label="Retry level">Retry</button>
      <button class="bigbtn altbtn" id="menuBtn" aria-label="Return to menu">Menu</button>
    </div>
  </div>
</div>

<script src="assets/vendor/three.r128.min.js"></script>
<script src="src/main.js"></script>
</body>
</html>
