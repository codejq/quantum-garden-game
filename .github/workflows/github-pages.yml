name: GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish-web-game:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web build to docs/game
        run: |
          rm -rf docs/game
          mkdir -p docs/game
          cp -R dist/web/. docs/game/
          touch docs/.nojekyll

      - name: Commit published web build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/.nojekyll docs/game
          if git diff --staged --quiet; then
            echo "GitHub Pages web game is already up-to-date."
          else
            git commit -m "chore: publish web game to GitHub Pages [skip ci]"
            git pull --rebase origin "${{ github.event.repository.default_branch }}"
            git push origin HEAD:"${{ github.event.repository.default_branch }}"
          fi
