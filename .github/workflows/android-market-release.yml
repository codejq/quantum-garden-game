name: Android Market Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sign-release:
    name: Build, Sign, Release, And Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: npm ci

      - name: Decode Android release keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.KEY_PASSWORD }}
        run: |
          KS_PATH="$GITHUB_WORKSPACE/clean-garden-release.jks"
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            printf '%s' "$KEYSTORE_BASE64" | tr -d ' \r\n' | base64 --decode > /tmp/clean-garden-orig.keystore
            keytool -importkeystore \
              -srckeystore /tmp/clean-garden-orig.keystore \
              -srcstorepass "$KEYSTORE_PASSWORD" \
              -destkeystore "$KS_PATH" \
              -deststoretype JKS \
              -deststorepass "$KEYSTORE_PASSWORD" \
              -noprompt
          elif [ -z "$KEYSTORE_BASE64" ] && [ -z "$KEYSTORE_PASSWORD" ] && [ -z "$KEY_ALIAS" ] && [ -z "$KEY_PASSWORD" ]; then
            echo "Android signing secrets are missing. Generating a temporary CI release key for this release only."
            KEYSTORE_PASSWORD="temporary-clean-garden-release"
            KEY_ALIAS="clean-garden"
            KEY_PASSWORD="$KEYSTORE_PASSWORD"
            keytool -genkeypair \
              -keystore "$KS_PATH" \
              -storetype JKS \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Clean Garden Temporary Release" \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD"
          else
            echo "Android signing secrets are partially configured. Provide all four signing values or none to use the temporary fallback."
            exit 1
          fi
          {
            echo "ANDROID_KEYSTORE_PATH=$KS_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build signed Android APK and AAB
        run: npm run tauri:android:build

      - name: Collect release artifacts
        run: |
          mkdir -p release/android
          APK_SOURCE="$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -n 1)"
          AAB_SOURCE="$(find src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -n 1)"
          test -n "$APK_SOURCE"
          test -n "$AAB_SOURCE"
          cp "$APK_SOURCE" "release/android/Clean-Garden-${{ github.ref_name }}.apk"
          cp "$AAB_SOURCE" "release/android/Clean-Garden-${{ github.ref_name }}.aab"
          ls -la release/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clean Garden ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/android/Clean-Garden-${{ github.ref_name }}.*

      - name: Check Google Play secret
        id: check_play
        env:
          KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Google Play
        if: steps.check_play.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: com.quantumbilling.cleangarding
          releaseFiles: release/android/*.aab
          track: internal
          status: completed

      - name: Remove keystore
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/clean-garden-release.jks" /tmp/clean-garden-orig.keystore
