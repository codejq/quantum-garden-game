name: F-Droid Publish

# Runs after Android Market Release succeeds or manually from the Actions tab.
#
# Self-hosted F-Droid repo setup:
#   Settings -> Pages -> Source: Deploy from branch -> Branch: main -> Folder: /docs
#
# Users add this repo URL to F-Droid:
#   https://<owner>.github.io/<repo>/fdroid/repo
#
# Official F-Droid publishing:
#   F-Droid does not accept uploaded APKs directly. Official publication is
#   done by opening a merge request against https://gitlab.com/fdroid/fdroiddata
#   so F-Droid can build the APK from source.
#
# Required GitHub Secrets:
#   FDROID_KEYSTORE_BASE64  - Base64-encoded JKS keystore used to sign the repo index.
#   FDROID_KEYSTORE_PASS    - Password for the keystore and the "fdroid" key alias.
#
# Optional official F-Droid GitLab secrets:
#   FDROID_GITLAB_TOKEN     - GitLab token with api + write_repository access to a fdroiddata fork.
#   FDROID_GITLAB_FORK      - Fork path, for example "your-gitlab-user/fdroiddata".
# Re-run this workflow after adding or rotating those GitLab secrets.

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fdroid-repo.yml'
      - 'LICENSE'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/index.html'
  workflow_run:
    workflows: ["Android Market Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  update-self-hosted-fdroid-repo:
    name: Update Self-Hosted F-Droid Repo
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install fdroidserver
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libmagic1 aapt
          pip install fdroidserver

      - name: Prepare directories
        run: mkdir -p fdroid-work/repo fdroid-work/metadata

      - name: Restore F-Droid keystore
        env:
          FDROID_B64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
          FDROID_PASS_RAW: ${{ secrets.FDROID_KEYSTORE_PASS }}
        run: |
          KS_PATH="$GITHUB_WORKSPACE/fdroid-work/keystore.jks"
          FDROID_PASS=$(printf '%s' "$FDROID_PASS_RAW" | tr -d '\r\n')
          if [ -n "$FDROID_B64" ] && [ -n "$FDROID_PASS" ]; then
            printf '%s' "$FDROID_B64" | tr -d ' \r\n' | base64 --decode > /tmp/fdroid-orig.jks
            keytool -importkeystore \
              -srckeystore /tmp/fdroid-orig.jks \
              -srcstoretype PKCS12 \
              -srcstorepass "$FDROID_PASS" \
              -destkeystore "$KS_PATH" \
              -deststoretype JKS \
              -deststorepass "$FDROID_PASS" \
              -noprompt
            rm -f /tmp/fdroid-orig.jks
          elif [ -z "$FDROID_B64" ] && [ -z "$FDROID_PASS" ]; then
            echo "F-Droid repo signing secrets are missing. Generating a temporary CI repo key for this release only."
            FDROID_PASS="temporary-clean-garden-fdroid"
            keytool -genkeypair \
              -keystore "$KS_PATH" \
              -storetype JKS \
              -alias fdroid \
              -keyalg RSA \
              -keysize 4096 \
              -sigalg SHA256withRSA \
              -validity 10000 \
              -dname "CN=Clean Garden Temporary F-Droid Repo" \
              -storepass "$FDROID_PASS" \
              -keypass "$FDROID_PASS"
          else
            echo "F-Droid repo signing secrets are partially configured. Provide both FDROID_KEYSTORE_BASE64 and FDROID_KEYSTORE_PASS or neither."
            exit 1
          fi
          echo "FDROID_KEYSTORE_PASS_EFFECTIVE=$FDROID_PASS" >> "$GITHUB_ENV"

          keytool -list \
            -keystore "$KS_PATH" \
            -storepass "$FDROID_PASS" 2>&1 | grep -E "Keystore type|Your keystore contains|Alias"

      - name: Write fdroid config
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/fdroid/repo"
          KS_PATH="$GITHUB_WORKSPACE/fdroid-work/keystore.jks"
          cat > fdroid-work/config.yml << EOF
          repo_url: "${REPO_URL}"
          repo_name: "Clean Garden"
          repo_description: "Clean Garden - offline 3D garden cleanup game"
          archive_older: 5
          keystore: "${KS_PATH}"
          keystorepass: "${FDROID_KEYSTORE_PASS_EFFECTIVE}"
          keypass: "${FDROID_KEYSTORE_PASS_EFFECTIVE}"
          repo_keyalias: fdroid
          keydname: "CN=Clean Garden F-Droid Repo"
          EOF
          chmod 600 fdroid-work/config.yml

      - name: Write app metadata
        run: |
          cat > fdroid-work/metadata/com.quantumbilling.cleangarding.yml << 'EOF'
          Categories:
            - Casual Game
          License: MIT
          WebSite: https://qb-solutions.us/
          SourceCode: https://github.com/${{ github.repository }}
          IssueTracker: https://github.com/${{ github.repository }}/issues
          Name: Clean Garden
          Summary: Offline 3D garden cleanup game
          Description: |-
            Clean Garden is an offline 3D garden cleanup and tree planting game
            by Quantum Billing LLC. It supports single-player and simultaneous
            two-player play, touch, mouse, keyboard, localized UI, score memory,
            avatar customization, and replay-friendly seeded levels.
          EOF

      - name: Download APK from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --json tagName -q .tagName)
          gh release download "$TAG" \
            --pattern "Clean-Garden-*.apk" \
            --dir fdroid-work/repo

      - name: Build F-Droid repo index
        run: |
          cd fdroid-work
          fdroid update -c

      - name: Remove keystore
        if: always()
        run: rm -f fdroid-work/keystore.jks

      - name: Publish to docs/fdroid
        run: |
          mkdir -p docs/fdroid/repo docs/fdroid/metadata
          cp -r fdroid-work/repo/. docs/fdroid/repo/
          cp -r fdroid-work/metadata/. docs/fdroid/metadata/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/fdroid/

          if git diff --staged --quiet; then
            echo "F-Droid repo is already up-to-date."
          else
            git commit -m "chore: update F-Droid repo [skip ci]"
            git pull --rebase origin "${{ github.event.repository.default_branch }}"
            git push origin HEAD:"${{ github.event.repository.default_branch }}"
          fi

  submit-official-fdroid:
    name: Submit To Official F-Droid
    runs-on: ubuntu-latest
    needs: update-self-hosted-fdroid-repo
    permissions:
      contents: read

    steps:
      - name: Check official F-Droid submission secrets
        id: fdroid_secrets
        env:
          FDROID_GITLAB_TOKEN: ${{ secrets.FDROID_GITLAB_TOKEN }}
          FDROID_GITLAB_FORK: ${{ secrets.FDROID_GITLAB_FORK }}
        run: |
          if [ -n "$FDROID_GITLAB_TOKEN" ] && [ -n "$FDROID_GITLAB_FORK" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping official F-Droid submission. Configure FDROID_GITLAB_TOKEN and FDROID_GITLAB_FORK to open/update a fdroiddata merge request."
          fi

      - name: Checkout source
        if: steps.fdroid_secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Prepare official fdroiddata metadata
        if: steps.fdroid_secrets.outputs.configured == 'true'
        run: |
          mkdir -p fdroiddata-submission/metadata/com.quantumbilling.cleangarding/en-US
          echo "Offline 3D garden cleanup game" > fdroiddata-submission/metadata/com.quantumbilling.cleangarding/en-US/summary.txt
          cat > fdroiddata-submission/metadata/com.quantumbilling.cleangarding.yml << 'EOF'
          Categories:
            - Casual Game
          License: MIT
          AuthorName: Quantum Billing LLC
          WebSite: https://qb-solutions.us/
          SourceCode: https://github.com/${{ github.repository }}
          IssueTracker: https://github.com/${{ github.repository }}/issues
          Changelog: https://github.com/${{ github.repository }}/releases

          AutoName: Clean Garden
          Description: |-
            Clean Garden is an offline 3D garden cleanup and tree planting game
            by Quantum Billing LLC. It supports single-player and simultaneous
            two-player play, touch, mouse, keyboard, localized UI, score memory,
            avatar customization, replay-friendly seeded levels, and an LLM
            agent play interface.

          RepoType: git
          Repo: https://github.com/${{ github.repository }}.git

          Builds:
            - versionName: 0.1.0
              versionCode: 1000
              commit: f9a42666d3728683c9b1c8e456a33681e39163c9
              subdir: src-tauri/gen/android
              sudo:
                - apt-get update
                - apt-get install -y build-essential curl npm pkg-config libssl-dev
                - yes | sdkmanager --licenses || true
                - sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
              init:
                - curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
                - $HOME/.cargo/bin/rustup target add aarch64-linux-android armv7-linux-androideabi
                  i686-linux-android x86_64-linux-android
                - cd ../../.. && npm ci && npm run build && rm -rf docs/fdroid && cd src-tauri
                  && $HOME/.cargo/bin/cargo fetch
                - mkdir -p src-tauri/gen/android; TAURI_ANDROID_DIR=$(find "$HOME/.cargo/registry/src"
                  -path "*/tauri-*/mobile/android" -type d | sort -V | tail -n 1); test -n "$TAURI_ANDROID_DIR";
                  printf "include ':tauri-android'\nproject(':tauri-android').projectDir = new
                  File('%s')\n" "$TAURI_ANDROID_DIR" | tee tauri.settings.gradle src-tauri/gen/android/tauri.settings.gradle
                  >/dev/null
                - mkdir -p app src-tauri/gen/android/app; printf "// THIS IS AN AUTOGENERATED
                  FILE. DO NOT EDIT THIS FILE DIRECTLY.\nval implementation by configurations\ndependencies
                  {\n  implementation(\"androidx.lifecycle:lifecycle-process:2.10.0\")\n implementation(project(\":tauri-android\"))\n}\n"
                  | tee app/tauri.build.gradle.kts src-tauri/gen/android/app/tauri.build.gradle.kts
                  >/dev/null
              gradle:
                - yes

          AutoUpdateMode: None
          UpdateCheckMode: None
          CurrentVersion: 0.1.0
          CurrentVersionCode: 1000
          EOF

      - name: Push metadata branch and open merge request
        if: steps.fdroid_secrets.outputs.configured == 'true'
        env:
          FDROID_GITLAB_TOKEN: ${{ secrets.FDROID_GITLAB_TOKEN }}
          FDROID_GITLAB_FORK: ${{ secrets.FDROID_GITLAB_FORK }}
        run: |
          set -euo pipefail
          BRANCH="add-clean-garden-com-quantumbilling-cleangarding"
          FORK_PATH=$(python3 - << 'PY'
          import os, re
          value = os.environ["FDROID_GITLAB_FORK"].strip()
          value = re.sub(r"^https://gitlab\.com/", "", value)
          value = re.sub(r"^git@gitlab\.com:", "", value)
          value = re.sub(r"\.git$", "", value)
          value = value.strip("/")
          if not value or "/" not in value:
              raise SystemExit("FDROID_GITLAB_FORK must look like 'user/fdroiddata' or a GitLab fork URL")
          print(value)
          PY
          )
          ENCODED_FORK=$(FORK_PATH="$FORK_PATH" python3 - << 'PY'
          import os, urllib.parse
          print(urllib.parse.quote(os.environ["FORK_PATH"], safe=""))
          PY
          )

          echo "Checking GitLab access to ${FORK_PATH}"
          curl --fail --silent --show-error \
            --header "PRIVATE-TOKEN: ${FDROID_GITLAB_TOKEN}" \
            "https://gitlab.com/api/v4/projects/${ENCODED_FORK}" >/dev/null

          git clone "https://oauth2:${FDROID_GITLAB_TOKEN}@gitlab.com/${FORK_PATH}.git" fdroiddata
          cd fdroiddata
          git remote add upstream https://gitlab.com/fdroid/fdroiddata.git
          git fetch upstream master
          git checkout -B "$BRANCH" upstream/master
          cp ../fdroiddata-submission/metadata/com.quantumbilling.cleangarding.yml metadata/com.quantumbilling.cleangarding.yml
          rm -rf metadata/com.quantumbilling.cleangarding
          cp -R ../fdroiddata-submission/metadata/com.quantumbilling.cleangarding metadata/com.quantumbilling.cleangarding
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metadata/com.quantumbilling.cleangarding.yml metadata/com.quantumbilling.cleangarding

          if git diff --staged --quiet; then
            echo "Official F-Droid metadata branch is already up-to-date."
          else
            git commit -m "Add Clean Garden"
          fi

          git push -f origin "$BRANCH"

          FORK_ID=$(curl --fail --silent --show-error --header "PRIVATE-TOKEN: ${FDROID_GITLAB_TOKEN}" \
            "https://gitlab.com/api/v4/projects/${ENCODED_FORK}" | jq -r '.id')
          TARGET_ID=$(curl --silent --header "PRIVATE-TOKEN: ${FDROID_GITLAB_TOKEN}" \
            "https://gitlab.com/api/v4/projects/fdroid%2Ffdroiddata" | jq -r '.id')

          EXISTING_IID=$(curl --silent --header "PRIVATE-TOKEN: ${FDROID_GITLAB_TOKEN}" \
            "https://gitlab.com/api/v4/projects/fdroid%2Ffdroiddata/merge_requests?state=opened&source_branch=${BRANCH}&source_project_id=${FORK_ID}" | jq -r '.[0].iid // empty')

          if [ -n "$EXISTING_IID" ]; then
            echo "Official F-Droid merge request already exists: https://gitlab.com/fdroid/fdroiddata/-/merge_requests/${EXISTING_IID}"
            exit 0
          fi

          set +e
          MR_RESPONSE=$(curl --silent --show-error --write-out "\n%{http_code}" --request POST \
            --header "PRIVATE-TOKEN: ${FDROID_GITLAB_TOKEN}" \
            --data-urlencode "source_branch=${BRANCH}" \
            --data-urlencode "target_branch=master" \
            --data-urlencode "target_project_id=${TARGET_ID}" \
            --data-urlencode "title=Add Clean Garden" \
            --data-urlencode "description=Adds Clean Garden, an offline 3D garden cleanup and tree planting game by Quantum Billing LLC." \
            "https://gitlab.com/api/v4/projects/${ENCODED_FORK}/merge_requests")
          MR_STATUS=$(printf '%s' "$MR_RESPONSE" | tail -n 1)
          MR_BODY=$(printf '%s' "$MR_RESPONSE" | sed '$d')
          set -e

          if [ "$MR_STATUS" -ge 200 ] && [ "$MR_STATUS" -lt 300 ]; then
            echo "$MR_BODY" | jq -r '.web_url'
          elif echo "$MR_BODY" | grep -qi "merge request already exists\\|Another open merge request"; then
            echo "Official F-Droid merge request already exists."
          else
            echo "$MR_BODY"
            exit 1
          fi
